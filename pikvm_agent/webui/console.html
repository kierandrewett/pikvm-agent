<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PiKVM Agent Console</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.45 ui-sans-serif, system-ui, sans-serif;
           background: #11141a; color: #e6eaf0; display: flex; height: 100vh; }
    #sidebar { width: 280px; border-right: 1px solid #232838; padding: 12px; overflow-y: auto; flex: none; }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    h1 { font-size: 15px; margin: 0 0 12px; color: #9fb4d8; letter-spacing: .02em; }
    .session { padding: 8px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 6px;
               border: 1px solid #232838; background: #161a23; }
    .session:hover { background: #1c2230; }
    .session.active { border-color: #3b82f6; background: #16203a; }
    .session .task { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session .id { color: #6b7690; font-size: 11px; }
    #topbar { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
              border-bottom: 1px solid #232838; }
    .badge { padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .b-running { background: #14361f; color: #7ee29a; }
    .b-needs_approval { background: #3a2c0e; color: #f0c869; }
    .b-blocked, .b-failed { background: #3a1620; color: #f08aa0; }
    .b-done { background: #1a2740; color: #8fb6f0; }
    #frameWrap { flex: 1; display: flex; align-items: center; justify-content: center;
                 background: #0b0d12; overflow: hidden; }
    #frame { max-width: 100%; max-height: 100%; object-fit: contain; }
    #right { width: 360px; border-left: 1px solid #232838; display: flex; flex-direction: column; flex: none; }
    #content { flex: 1; display: flex; min-height: 0; }
    .panel-title { font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
                   color: #6b7690; padding: 10px 14px 4px; }
    #events { flex: 1; overflow-y: auto; padding: 0 14px 14px; font-family: ui-monospace, monospace; font-size: 12px; }
    .ev { padding: 3px 0; border-bottom: 1px solid #1b202c; color: #b6c0d4; }
    .ev .k { color: #7aa2f7; }
    #approval { padding: 12px 14px; border-top: 1px solid #232838; background: #1a160c; display: none; }
    #approval.show { display: block; }
    #approval .reason { color: #f0c869; margin-bottom: 8px; }
    button { font: inherit; padding: 7px 12px; border-radius: 8px; border: 1px solid #2d3650;
             background: #1c2230; color: #e6eaf0; cursor: pointer; }
    button:hover { background: #283044; }
    button.primary { background: #1e40af; border-color: #2c52c8; }
    button.danger { background: #5b1a2a; border-color: #7a2436; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    pre#memory { white-space: pre-wrap; font-size: 11px; color: #c8d2e6; padding: 10px 14px;
                 max-height: 220px; overflow-y: auto; border-top: 1px solid #232838; display: none; }
    pre#memory.show { display: block; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>PiKVM Agent</h1>
    <div id="sessions"></div>
  </div>
  <div id="main">
    <div id="topbar">
      <span id="status" class="badge b-done">—</span>
      <span id="meta" style="color:#6b7690; font-size:12px;"></span>
      <span style="flex:1"></span>
      <div class="btn-row">
        <button id="continue" class="primary">Continue</button>
        <button id="abort" class="danger">Abort</button>
        <button id="export">Export memory</button>
      </div>
    </div>
    <div id="frameWrap"><img id="frame" alt="live frame" /></div>
    <pre id="memory"></pre>
  </div>
  <div id="right">
    <div class="panel-title">Event feed</div>
    <div id="events"></div>
    <div id="approval">
      <div class="reason"></div>
      <div class="btn-row">
        <button id="approve" class="primary">Approve</button>
        <button id="reject" class="danger">Reject</button>
      </div>
    </div>
  </div>
  <script src="/ui/app.js"></script>
</body>
</html>
